<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <rect width="1280" height="640" fill="#0e0e0e"/>

  <!-- brand mark (baseliner-logo.svg, 468x468) scaled + placed left -->
  <g transform="translate(96,168) scale(0.65)">
    <g fill="none" stroke="#00A59C" stroke-width="20">
      <polygon points="141.22,10.00 326.78,10.00 458.00,141.22 458.00,326.78 326.78,458.00 141.22,458.00 10.00,326.78 10.00,141.22" stroke-linejoin="miter"/>
    </g>
    <g fill="#00A59C">
      <circle cx="103" cy="185" r="40"/>
      <circle cx="228" cy="185" r="40"/>
      <rect x="60" y="266" width="349" height="31" rx="2"/>
    </g>
    <polyline points="318,190 342,209 388,139" fill="none" stroke="#00A59C" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="DejaVu Sans, Liberation Sans, sans-serif">
